apiVersion: apps/v1
kind: Deployment
metadata:
  name: smashshop-frontend-deployment
  namespace: application-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smashshop-frontend
  template:
    metadata:
      labels:
        app: smashshop-frontend
    spec:
      containers:
      - name: smashshop-frontend
        image: nhongcuong/smash-shop-frontend-image:101
        ports:
        - containerPort: 80
        - containerPort: 443
        envFrom:
        - secretRef:
            name: smashshop-frontend-secret
        env:
        - name: REACT_APP_API_URL
          value: ""
        # --- PHẦN THÊM MỚI 1: Gắn file vào thư mục bên trong Container ---
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf  # Chỉ ghi đè đúng file default.conf
        - name: ssl-certs
          mountPath: /etc/nginx/ssl
          readOnly: true
      # --- PHẦN THÊM MỚI 2: Định nghĩa nguồn dữ liệu cho Volume ---
      volumes:
      - name: nginx-config
        configMap:
          name: frontend-nginx-config # Tên ConfigMap chứa nội dung file default.conf
          defaultMode: 0644
      - name: ssl-certs
        secret:
          secretName: frontend-tls-secret
